name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "26.5.0"
  ZIG_VERSION: "0.15.2"

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      REQUIRE_NODE_FFI: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: bun ci
      - run: bun test
      - run: bunx tsc --project tsconfig.json
      - shell: bash
        run: bash examples/run-all.sh
